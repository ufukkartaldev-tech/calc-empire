# SonarQube Configuration for CalcEmpire

# Project identification
sonar.projectKey=calc-empire
sonar.projectName=CalcEmpire
sonar.projectVersion=0.1.0

# Source code location
sonar.sources=src
sonar.tests=src/__tests__

# Exclusions
sonar.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/node_modules/**,**/.next/**,**/out/**,**/coverage/**

# Test coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.testExecutionReportPaths=coverage/test-report.xml

# Language
sonar.language=ts
sonar.sourceEncoding=UTF-8

# TypeScript specific
sonar.typescript.node=node_modules

# Code quality rules
sonar.qualitygate.wait=true
